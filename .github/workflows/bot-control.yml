name: Bot Control

on:
  schedule:
    - cron: "*/10 * * * *"   # раз в 10 минут читаем команды из Telegram
  workflow_dispatch: {}

# не запускать два экземпляра одновременно (иначе оба заберут одни и те же сообщения)
concurrency:
  group: bot-control
  cancel-in-progress: false

jobs:
  process-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Process Telegram commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python control.py

      - name: Save config / state
        run: |
          git config user.name "rental-bot"
          git config user.email "rental-bot@users.noreply.github.com"
          git add config.json tg_state.json
          if ! git diff --staged --quiet; then
            git commit -m "Update settings from Telegram"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              sleep 5
            done
          fi
