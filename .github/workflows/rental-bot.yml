name: Rental Bot

on:
  schedule:
    # раз в 4 часа — чтобы уложиться в бесплатный лимит ScraperAPI (~1000 запросов/мес).
    # Если перейдёшь на платный тариф/свой прокси — можно вернуть ежечасный "0 * * * *".
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  check-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPE_PROXY: ${{ secrets.SCRAPE_PROXY }}
        run: python bot.py

      - name: Save seen listings
        run: |
          git config user.name "rental-bot"
          git config user.email "rental-bot@users.noreply.github.com"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "Update seen listings"
          git push
